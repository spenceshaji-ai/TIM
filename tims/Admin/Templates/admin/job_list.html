<!DOCTYPE html>
<html>
<head>
    <title>Job List</title>
</head>
<body>

<h2>Job List</h2>

<a href="{% url 'job_create' %}">Add Job</a>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Company</th>
        <th>Location</th>
        <th>Type</th>
        <th>Salary</th>
        <th>Actions</th>
    </tr>

    {% for job in jobs %}
    <tr>
        <td>{{ job.id }}</td>
        <td>{{ job.title }}</td>
        <td>{{ job.company }}</td>
        <td>{{ job.location }}</td>
        <td>{{ job.job_type }}</td>
        <td>{{ job.salary }}</td>
        <td>
            <a href="{% url 'job_edit' job.id %}">Edit</a> |
            <a href="{% url 'job_delete' job.id %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="7">No jobs available</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
