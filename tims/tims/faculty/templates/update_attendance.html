{% extends "forms.html" %}

{% block form_title %}
Update Attendance
{% endblock %}

{% block form_action %}
{% url 'faculty:attendance_update' form.instance.pk %}
{% endblock %}

{% block form_body %}
{{ form.as_p }}
{% endblock %}

{% block form_button %}
<button type="submit" class="btn btn-primary">
    Update Attendance
</button>

<a href="{% url 'faculty:attendance_list' %}" class="btn btn-secondary ms-2">
    Cancel
</a>
{% endblock %}
