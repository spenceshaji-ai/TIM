{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-danger">Delete Enquiry</h2>

    <div class="alert alert-warning mt-3">
        Are you sure you want to delete enquiry:
        <strong>{{ enquiry.name }}</strong>?
    </div>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Yes, Delete
        </button>

        <a href="{% url 'adminapp:enquiry_list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
