<!DOCTYPE html>
<html>

<head>
    <title>Add Payment</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Add Payment</h4>
            </div>

            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        {{ form.admission.label_tag }}
                        {{ form.admission }}
                    </div>

                    <div class="mb-3">
                        {{ form.amount.label_tag }}
                        {{ form.amount }}
                    </div>

                    <div class="mb-3">
                        {{ form.status.label_tag }}
                        {{ form.status }}
                    </div>

                    <button type="submit" class="btn btn-success">
                        Save Payment
                    </button>

                    <a href="{% url 'adminapp:payment_list' %}" class="btn btn-secondary">
                        View Payments
                    </a>
                </form>
            </div>
        </div>

    </div>

</body>

</html>
