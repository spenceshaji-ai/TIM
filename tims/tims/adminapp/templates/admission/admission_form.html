{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-4">

    <h2>Convert Enquiry to Admission</h2>

    <div class="alert alert-info">
        Enquiry: <strong>{{ enquiry.name }}</strong>
    </div>

    <form method="POST">
        {% csrf_token %}

        {{ form|crispy }}

        <button type="submit" class="btn btn-success mt-3">
            Confirm Admission
        </button>

        <a href="{% url 'adminapp:enquiry_detail' enquiry.id %}" class="btn btn-secondary mt-3">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
