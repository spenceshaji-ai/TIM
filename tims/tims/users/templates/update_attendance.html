{% extends "forms.html" %}

{% block content %}
<div class="container mt-4">
    <h3>{{ title }}</h3>
    <hr>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Update Attendance
        </button>

        <a href="{% url 'attendance_list' %}" class="btn btn-secondary ms-2">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
