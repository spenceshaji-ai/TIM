{% extends "base.html" %}

{% block title %}Logout{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="card shadow-lg border-0 p-5 text-center" style="max-width: 420px; width: 100%; border-radius: 18px;">

        <!-- Icon -->
        <div style="font-size: 55px;">🔒</div>

        <!-- Title -->
        <h3 class="mt-3 mb-2 fw-bold">Logout</h3>

        <!-- Message -->
        <p class="text-muted mb-4">
            Are you sure you want to logout from your account?
        </p>

        <!-- Form -->
        <form method="post">
            {% csrf_token %}

            <button type="submit" class="btn btn-primary w-100 fw-semibold"
                style="padding: 12px; border-radius: 10px; font-size: 16px;">
                Logout
            </button>
        </form>

        <!-- Cancel Link -->
        <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100 mt-3" style="border-radius: 10px;">
            Cancel
        </a>

    </div>

</div>

{% endblock %}
