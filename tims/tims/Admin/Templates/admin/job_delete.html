<!DOCTYPE html>
<html>
<head>
    <title>Delete Job</title>
</head>
<body>

<h3>Are you sure you want to delete this job?</h3>

<p>
    <strong>{{ job.title }}</strong> at {{ job.company }}
</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'job_list' %}">Cancel</a>

</body>
</html>
