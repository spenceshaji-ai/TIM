{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

  <h2>User Details</h2>

  <p><b>Username:</b> {{ object.username }}</p>
  <p><b>Email:</b> {{ object.email }}</p>
  <p><b>Phone:</b> {{ object.phone }}</p>

  <!-- ✅ Updated Role Section -->
  <p>
    <b>Role:</b> {{ object.role.role_name }}
    <br>
    <small class="text-muted">
      {{ object.role.description }}
    </small>
  </p>

  <p><b>Status:</b> {{ object.status }}</p>

  <a href="{% url 'user_edit' object.id %}" class="btn btn-warning">
    Edit
  </a>

</div>
{% endblock %}
