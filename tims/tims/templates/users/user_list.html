{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

  <h2>User Management</h2>

  <a href="{% url 'user_add' %}" class="btn btn-primary mb-3">
    ➕ Add User
  </a>

  <table class="table table-bordered">
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Role</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>

    {% for user in users %}
    <tr>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.role.role_name }}</td>
      <td>{{ user.status }}</td>

      <td>
        <a href="{% url 'user_detail' user.id %}">View</a> |
        <a href="{% url 'user_edit' user.id %}">Edit</a> |
        <a href="{% url 'users:user_delete' user.id %}">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </table>

</div>
{% endblock %}
