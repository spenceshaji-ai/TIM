{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">

    <h2>Add / Update Enquiry</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}

        <button class="btn btn-success mt-3">
            Save Enquiry
        </button>
    </form>

</div>
{% endblock %}
