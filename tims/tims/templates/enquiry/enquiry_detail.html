{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2>Enquiry List</h2>

    <a href="{% url 'users:enquiry_add' %}" class="btn btn-primary mb-3">
        ➕ Add Enquiry
    </a>

    <table class="table table-bordered">
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for e in enquiries %}
        <tr>
            <td>{{ e.name }}</td>
            <td>{{ e.course }}</td>
            <td>{{ e.status }}</td>

            <td>
                <a href="{% url 'users:enquiry_detail' e.id %}" class="btn btn-info btn-sm">
                    View
                </a>

                <a href="{% url 'users:enquiry_edit' e.id %}" class="btn btn-warning btn-sm">
                    Edit
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>
{% endblock %}
